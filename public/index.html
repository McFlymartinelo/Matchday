<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0B1524">
  <script>
    (function () {
      var t = localStorage.getItem('matchday_theme') === 'dark' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.content = t === 'dark' ? '#0a0c14' : '#0B1524';
    })();
  </script>
  <meta name="description" content="Matchday — Pronostics football entre amis">
  <title>Matchday</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.png?v=2" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-180.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css?v=18">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/js/app.js?v=18"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js?v=6').catch(() => {});
    }
  </script>
</body>
</html>
